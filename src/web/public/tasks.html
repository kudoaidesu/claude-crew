<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>タスクモニター - pocket-cc</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1e1e2e;--surface:#252536;--surface-hover:#2a2a3d;
  --border:#333346;--border-light:#3e3e56;
  --text:#cdd6f4;--text-bright:#fff;--muted:#6c7086;
  --accent:#c084fc;--accent-dim:rgba(192,132,252,.12);--accent-border:rgba(192,132,252,.25);
  --warning:#f9e2af;--warning-bg:rgba(249,226,175,.08);
  --danger:#f38ba8;--danger-bg:rgba(243,139,168,.08);
  --success:#a6e3a1;--success-bg:rgba(166,227,161,.08);
  --blue:#89b4fa;--blue-bg:rgba(137,180,250,.12);
  --mauve:#cba6f7;
  --font-sans:-apple-system,system-ui,'Segoe UI','Helvetica Neue',sans-serif;
  --font-mono:'SF Mono',Menlo,'Cascadia Code','JetBrains Mono',Consolas,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.6}
body{display:flex;flex-direction:column;height:100dvh}
svg.ic{width:1em;height:1em;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;vertical-align:-.125em;flex-shrink:0}

/* ── ヘッダー ── */
.header{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.header-back{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;display:flex;align-items:center;border-radius:6px;transition:all .15s}
.header-back:hover{color:var(--text);background:var(--surface-hover)}
.header-back svg.ic{font-size:18px}
.header-title{flex:1;font-weight:700;font-size:14px;color:var(--accent)}
.header-refresh{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;display:flex;align-items:center;border-radius:6px;transition:all .15s}
.header-refresh:hover{color:var(--text);background:var(--surface-hover)}
.header-refresh.spinning svg.ic{animation:spin .6s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── サマリーバッジ行 ── */
.summary-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.summary-bar::-webkit-scrollbar{display:none}
.summary-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.summary-badge:hover{opacity:.85}
.summary-badge.active{border-color:currentColor;background:transparent}
.summary-badge.all{color:var(--text);background:var(--surface-hover)}
.summary-badge.running{color:var(--blue);background:var(--blue-bg)}
.summary-badge.pending{color:var(--muted);background:rgba(108,112,134,.1)}
.summary-badge.completed{color:var(--success);background:var(--success-bg)}
.summary-badge.failed{color:var(--danger);background:var(--danger-bg)}
.summary-badge.recovering{color:var(--warning);background:var(--warning-bg)}
.summary-badge.blocked_rate_limit{color:var(--mauve);background:var(--accent-dim)}
.badge-count{font-size:11px;opacity:.8}

/* ── SSE 接続状態インジケーター ── */
.sse-indicator{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0}
.sse-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s}
.sse-dot.connected{background:var(--success);animation:ssePulse 2s infinite}
.sse-dot.error{background:var(--danger)}
@keyframes ssePulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── メインコンテナ ── */
.main{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}

/* ── タスクカード ── */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;position:relative}
.task-card:hover,.task-card:active{border-color:var(--accent-border);background:var(--surface-hover)}
.task-card.status-running{background:color-mix(in srgb,var(--blue) 6%,var(--surface));border-color:rgba(137,180,250,.25)}
.task-card.status-completed{background:color-mix(in srgb,var(--success) 5%,var(--surface));border-color:rgba(166,227,161,.2)}
.task-card.status-failed{background:color-mix(in srgb,var(--danger) 5%,var(--surface));border-color:rgba(243,139,168,.2)}
.task-card.status-recovering{background:color-mix(in srgb,var(--warning) 5%,var(--surface));border-color:rgba(249,226,175,.2)}
.task-card.status-blocked_rate_limit{background:color-mix(in srgb,var(--mauve) 6%,var(--surface));border-color:var(--accent-border)}
.task-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.task-title{flex:1;font-size:14px;color:var(--text-bright);font-weight:500;line-height:1.4;word-break:break-word}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap;letter-spacing:.01em}
.status-badge.running{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(137,180,250,.3)}
.status-badge.pending{background:rgba(108,112,134,.15);color:var(--muted);border:1px solid rgba(108,112,134,.2)}
.status-badge.completed{background:var(--success-bg);color:var(--success);border:1px solid rgba(166,227,161,.25)}
.status-badge.failed{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(243,139,168,.25)}
.status-badge.recovering{background:var(--warning-bg);color:var(--warning);border:1px solid rgba(249,226,175,.25)}
.status-badge.blocked_rate_limit{background:var(--accent-dim);color:var(--mauve);border:1px solid var(--accent-border)}
.task-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.priority-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.priority-badge.critical{background:rgba(243,139,168,.15);color:var(--danger)}
.priority-badge.high{background:rgba(249,226,175,.1);color:var(--warning)}
.priority-badge.medium{background:var(--blue-bg);color:var(--blue)}
.priority-badge.low{background:rgba(108,112,134,.1);color:var(--muted)}
.task-elapsed{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
.task-latest-event{margin-top:8px;padding:6px 10px;background:var(--bg);border-radius:6px;font-size:11px;color:var(--muted);line-height:1.4;border-left:2px solid var(--border);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.task-latest-event .event-type{color:var(--accent);font-family:var(--font-mono);font-size:10px;display:block;margin-bottom:2px}

/* ── スケルトンローダー ── */
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-hover) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;height:90px;margin-bottom:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── 空状態 ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state svg.ic{font-size:40px;margin:0 auto 12px;display:block;color:var(--border)}
.empty-state p{font-size:14px}

/* ── ドロワー（詳細） ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;-webkit-tap-highlight-color:transparent}
.drawer-overlay.open{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:92dvh;background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;z-index:101;overflow:hidden;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.drawer-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.drawer-title{flex:1;font-weight:700;font-size:15px;color:var(--text-bright)}
.drawer-close{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:6px}
.drawer-close:hover{color:var(--text);background:var(--surface-hover)}
.drawer-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.detail-row{padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;font-size:13px}
.detail-row:last-of-type{border-bottom:none}
.detail-label{color:var(--muted);font-size:11px;font-family:var(--font-mono);min-width:90px;flex-shrink:0;padding-top:1px}
.detail-value{color:var(--text);word-break:break-word;flex:1;line-height:1.5}
.detail-value.mono{font-family:var(--font-mono);font-size:12px}
.detail-value pre{white-space:pre-wrap;word-break:break-word;font-size:11px;background:var(--bg);padding:8px;border-radius:6px;border:1px solid var(--border);max-height:180px;overflow-y:auto}

/* ── タイムライン ── */
.timeline-title{font-size:12px;color:var(--muted);margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.timeline-title::after{content:'';flex:1;height:1px;background:var(--border)}
.timeline{border-left:2px solid var(--border);margin-left:6px;padding-left:14px}
.timeline-entry{position:relative;margin-bottom:10px;font-size:12px}
.timeline-entry::before{content:'';position:absolute;left:-19px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--border);border:2px solid var(--bg)}
.timeline-entry.type-created::before{background:var(--blue)}
.timeline-entry.type-started::before{background:var(--accent)}
.timeline-entry.type-completed::before{background:var(--success)}
.timeline-entry.type-failed::before{background:var(--danger)}
.timeline-entry.type-checkpoint::before{background:var(--warning)}
.timeline-event-type{color:var(--accent);font-family:var(--font-mono);font-size:10px;margin-bottom:2px}
.timeline-payload{color:var(--muted);line-height:1.4;word-break:break-word}
.timeline-time{font-size:10px;color:var(--muted);font-family:var(--font-mono);margin-top:2px}

/* ── ライトテーマ (Catppuccin Latte) ── */
[data-theme="light"]{
  --bg:#eff1f5;--surface:#ffffff;--surface-hover:#f2f4f8;
  --border:#dce0e8;--border-light:#ccd0da;
  --text:#4c4f69;--text-bright:#1e1e2e;--muted:#8c8fa1;
  --accent:#8839ef;--accent-dim:rgba(136,57,239,.08);--accent-border:rgba(136,57,239,.2);
  --warning:#df8e1d;--warning-bg:rgba(223,142,29,.08);
  --danger:#d20f39;--danger-bg:rgba(210,15,57,.06);
  --success:#40a02b;--success-bg:rgba(64,160,43,.06);
  --blue:#1e66f5;--blue-bg:rgba(30,102,245,.08);
  --mauve:#7287fd;
}
[data-theme="light"] .task-card{box-shadow:0 1px 3px rgba(0,0,0,.06)}
[data-theme="light"] .skeleton{background:linear-gradient(90deg,#e6e9ef 25%,#f2f4f8 50%,#e6e9ef 75%);background-size:200% 100%}

/* ── レスポンシブ ── */
@media(max-width:480px){
  .header{padding:8px 12px}
  .main{padding:10px 12px}
  .task-card{padding:12px 14px}
  .summary-bar{padding:8px 12px}
}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <button class="header-back" onclick="window.location='/'">
    <svg class="ic" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <span class="header-title">タスクモニター</span>
  <button class="header-refresh" id="refreshBtn" onclick="loadTasks()" title="更新">
    <svg class="ic" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
  </button>
</div>

<!-- サマリーバッジ行 -->
<div class="summary-bar" id="summaryBar">
  <span class="summary-badge all active" data-status="" onclick="setFilter('')">
    すべて <span class="badge-count" id="countAll">-</span>
  </span>
  <span class="summary-badge running" data-status="running" onclick="setFilter('running')">
    <svg class="ic" viewBox="0 0 24 24" style="font-size:12px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    実行中 <span class="badge-count" id="countRunning">0</span>
  </span>
  <span class="summary-badge pending" data-status="pending" onclick="setFilter('pending')">
    <svg class="ic" viewBox="0 0 24 24" style="font-size:12px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    保留中 <span class="badge-count" id="countPending">0</span>
  </span>
  <span class="summary-badge completed" data-status="completed" onclick="setFilter('completed')">
    <svg class="ic" viewBox="0 0 24 24" style="font-size:12px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
    完了 <span class="badge-count" id="countCompleted">0</span>
  </span>
  <span class="summary-badge failed" data-status="failed" onclick="setFilter('failed')">
    <svg class="ic" viewBox="0 0 24 24" style="font-size:12px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    失敗 <span class="badge-count" id="countFailed">0</span>
  </span>
  <span class="summary-badge recovering" data-status="recovering" onclick="setFilter('recovering')">
    回復中 <span class="badge-count" id="countRecovering">0</span>
  </span>
  <div class="sse-indicator">
    <span class="sse-dot" id="sseDot"></span>
    <span id="sseLabel">接続中...</span>
  </div>
</div>

<!-- メインコンテンツ -->
<div class="main" id="main">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<!-- 詳細ドロワー -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <span class="drawer-title" id="drawerTitle">タスク詳細</span>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg class="ic" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script src="/static/theme.js"></script>
<script>
// ── 状態 ──────────────────────────────────────────────────────────────────
let currentFilter = ''
let tasksData = []
let elapsedTimers = {}
let eventSource = null

// ── ユーティリティ ────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return ''
  const d = document.createElement('div')
  d.textContent = str
  return d.innerHTML
}

function formatTime(isoStr) {
  if (!isoStr) return ''
  try {
    return new Date(isoStr).toLocaleString('ja-JP', {
      month: 'numeric', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    })
  } catch { return isoStr }
}

function elapsedSince(isoStr) {
  if (!isoStr) return ''
  const diff = Date.now() - new Date(isoStr).getTime()
  if (diff < 0) return '0s'
  const s = Math.floor(diff / 1000)
  if (s < 60) return `${s}s`
  const m = Math.floor(s / 60)
  if (m < 60) return `${m}m ${s % 60}s`
  return `${Math.floor(m / 60)}h ${m % 60}m`
}

function statusClass(status) {
  const map = {
    running: 'running',
    pending: 'pending',
    completed: 'completed',
    failed: 'failed',
    recovering: 'recovering',
    blocked_rate_limit: 'blocked_rate_limit',
  }
  return map[status] || 'pending'
}

function statusLabel(status) {
  const map = {
    running: '実行中',
    pending: '保留中',
    completed: '完了',
    failed: '失敗',
    recovering: '回復中',
    blocked_rate_limit: '制限中',
  }
  return map[status] || status
}

function priorityLabel(priority) {
  const map = {
    critical: '緊急',
    high: '高',
    medium: '中',
    low: '低',
  }
  return map[priority] || priority
}

function modeLabel(mode) {
  const map = {
    safe: '安全',
    auto: '自動',
  }
  return map[mode] || mode
}

// ── フィルター ────────────────────────────────────────────────────────────
function setFilter(status) {
  currentFilter = status
  document.querySelectorAll('.summary-badge').forEach(el => {
    el.classList.toggle('active', el.dataset.status === status)
  })
  renderCards()
}

// ── サマリー更新 ──────────────────────────────────────────────────────────
function updateSummary(summary) {
  const total = Object.values(summary).reduce((a, b) => a + b, 0)
  document.getElementById('countAll').textContent = total || '0'
  document.getElementById('countRunning').textContent = summary.running || '0'
  document.getElementById('countPending').textContent = summary.pending || '0'
  document.getElementById('countCompleted').textContent = summary.completed || '0'
  document.getElementById('countFailed').textContent = summary.failed || '0'
  document.getElementById('countRecovering').textContent = summary.recovering || '0'
}

// ── タスク読み込み ─────────────────────────────────────────────────────────
async function loadTasks() {
  const btn = document.getElementById('refreshBtn')
  btn.classList.add('spinning')
  const main = document.getElementById('main')
  main.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>'

  try {
    const res = await fetch('/api/tasks')
    const data = await res.json()
    tasksData = data.items || []
    updateSummary(data.summary || {})
    renderCards()
  } catch (e) {
    main.innerHTML = `<div class="empty-state">
      <svg class="ic" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <p>読み込みエラー: ${esc(e.message)}</p>
    </div>`
  } finally {
    btn.classList.remove('spinning')
  }
}

// ── カード描画 ────────────────────────────────────────────────────────────
function renderCards() {
  const main = document.getElementById('main')

  // elapsedTimers をリセット
  clearElapsedTimers()

  const filtered = currentFilter
    ? tasksData.filter(t => t.status === currentFilter)
    : tasksData

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state">
      <svg class="ic" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
      <p>タスクなし</p>
    </div>`
    return
  }

  main.innerHTML = filtered.map(task => renderCard(task)).join('')

  // running タスクの経過時間カウントアップ開始
  filtered.filter(t => t.status === 'running' && t.started_at).forEach(task => {
    startElapsedTimer(task.id, task.started_at)
  })
}

function renderCard(task) {
  const sc = statusClass(task.status)
  const latestEvent = task.latest_event_type
    ? `<div class="task-latest-event">
        <span class="event-type">${esc(task.latest_event_type)}</span>
        ${esc(safeParsePayload(task.latest_event_payload))}
       </div>`
    : ''

  const elapsedId = `elapsed-${task.id}`
  const elapsedHtml = task.status === 'running' && task.started_at
    ? `<span class="task-elapsed" id="${elapsedId}">0s</span>`
    : task.completed_at
    ? `<span class="task-elapsed">${formatRelative(task.started_at, task.completed_at)}</span>`
    : ''

  return `<div class="task-card status-${sc}" onclick="openDetail(${task.id})">
    <div class="task-card-header">
      <div class="task-title">${esc(task.title)}</div>
      <span class="status-badge ${sc}">${statusLabel(task.status)}</span>
    </div>
    <div class="task-meta">
      <span>${esc(task.worker_name || task.worker_id)}</span>
      <span class="priority-badge ${task.priority || 'medium'}">${priorityLabel(task.priority || 'medium')}</span>
      <span style="font-size:10px;color:var(--muted)">${modeLabel(task.execution_mode || 'safe')}</span>
      ${elapsedHtml}
    </div>
    ${latestEvent}
  </div>`
}

function safeParsePayload(raw) {
  if (!raw) return ''
  try {
    const obj = JSON.parse(raw)
    if (typeof obj === 'string') return obj
    return Object.entries(obj).map(([k, v]) => `${k}: ${v}`).join(' | ')
  } catch {
    return raw
  }
}

function formatRelative(startIso, endIso) {
  if (!startIso || !endIso) return ''
  const diff = new Date(endIso).getTime() - new Date(startIso).getTime()
  if (diff < 0) return ''
  const s = Math.floor(diff / 1000)
  if (s < 60) return `${s}s`
  const m = Math.floor(s / 60)
  if (m < 60) return `${m}m ${s % 60}s`
  return `${Math.floor(m / 60)}h ${m % 60}m`
}

// ── 経過時間タイマー ──────────────────────────────────────────────────────
function startElapsedTimer(taskId, startedAt) {
  const tick = () => {
    const el = document.getElementById(`elapsed-${taskId}`)
    if (!el) {
      clearInterval(elapsedTimers[taskId])
      delete elapsedTimers[taskId]
      return
    }
    el.textContent = elapsedSince(startedAt)
  }
  tick()
  elapsedTimers[taskId] = setInterval(tick, 1000)
}

function clearElapsedTimers() {
  for (const id of Object.keys(elapsedTimers)) {
    clearInterval(elapsedTimers[id])
  }
  elapsedTimers = {}
}

// ── 詳細ドロワー ──────────────────────────────────────────────────────────
async function openDetail(taskId) {
  document.getElementById('drawerTitle').textContent = 'タスク詳細'
  document.getElementById('drawerBody').innerHTML = '<div style="color:var(--muted);text-align:center;padding:24px">読み込み中...</div>'
  document.getElementById('drawerOverlay').classList.add('open')
  document.getElementById('drawer').classList.add('open')

  try {
    const res = await fetch(`/api/tasks/${taskId}`)
    const data = await res.json()
    const { task, events } = data

    if (!task) {
      document.getElementById('drawerBody').innerHTML = '<div style="color:var(--danger);padding:16px">タスクが見つかりません</div>'
      return
    }

    document.getElementById('drawerTitle').textContent = task.title

    const sc = statusClass(task.status)
    let html = `
      <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value mono">#${task.id}</span></div>
      <div class="detail-row"><span class="detail-label">ステータス</span><span class="detail-value"><span class="status-badge ${sc}">${statusLabel(task.status)}</span></span></div>
      <div class="detail-row"><span class="detail-label">ワーカー</span><span class="detail-value">${esc(task.worker_name)} <span style="color:var(--muted);font-size:11px">(${esc(task.project_slug)})</span></span></div>
      <div class="detail-row"><span class="detail-label">優先度</span><span class="detail-value"><span class="priority-badge ${task.priority || 'medium'}">${priorityLabel(task.priority || 'medium')}</span></span></div>
      <div class="detail-row"><span class="detail-label">実行モード</span><span class="detail-value mono">${modeLabel(task.execution_mode || 'safe')}</span></div>
      <div class="detail-row"><span class="detail-label">リトライ</span><span class="detail-value">${task.retry_count || 0} 回</span></div>
      <div class="detail-row"><span class="detail-label">作成日時</span><span class="detail-value mono">${esc(formatTime(task.created_at))}</span></div>
    `
    if (task.started_at) html += `<div class="detail-row"><span class="detail-label">開始日時</span><span class="detail-value mono">${esc(formatTime(task.started_at))}</span></div>`
    if (task.completed_at) html += `<div class="detail-row"><span class="detail-label">完了日時</span><span class="detail-value mono">${esc(formatTime(task.completed_at))}</span></div>`
    if (task.description) html += `<div class="detail-row"><span class="detail-label">説明</span><span class="detail-value">${esc(task.description)}</span></div>`
    if (task.last_error) html += `<div class="detail-row"><span class="detail-label">最終エラー</span><span class="detail-value" style="color:var(--danger)">${esc(task.last_error)}</span></div>`
    if (task.checkpoint) {
      let checkpointText = task.checkpoint
      try { checkpointText = JSON.stringify(JSON.parse(task.checkpoint), null, 2) } catch {}
      html += `<div class="detail-row"><span class="detail-label">チェックポイント</span><span class="detail-value mono"><pre>${esc(checkpointText)}</pre></span></div>`
    }

    // タイムライン
    if (events && events.length > 0) {
      html += '<div class="timeline-title">タイムライン</div>'
      html += '<div class="timeline">'
      for (const ev of events) {
        const typeClass = `type-${ev.event_type}`.replace(/[^a-z0-9-]/g, '-')
        let payloadText = ''
        if (ev.payload) {
          try {
            const obj = JSON.parse(ev.payload)
            payloadText = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2)
          } catch { payloadText = ev.payload }
        }
        html += `<div class="timeline-entry ${typeClass}">
          <div class="timeline-event-type">${esc(ev.event_type)}</div>
          ${payloadText ? `<div class="timeline-payload">${esc(payloadText)}</div>` : ''}
          <div class="timeline-time">${esc(formatTime(ev.created_at))}</div>
        </div>`
      }
      html += '</div>'
    } else {
      html += '<div style="color:var(--muted);font-size:12px;margin-top:16px">イベントなし</div>'
    }

    document.getElementById('drawerBody').innerHTML = html
  } catch (e) {
    document.getElementById('drawerBody').innerHTML = `<div style="color:var(--danger);padding:16px">エラー: ${esc(e.message)}</div>`
  }
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open')
  document.getElementById('drawer').classList.remove('open')
}

// ── SSE 接続 ──────────────────────────────────────────────────────────────
function connectSSE() {
  if (eventSource) {
    eventSource.close()
    eventSource = null
  }

  const dot = document.getElementById('sseDot')
  const label = document.getElementById('sseLabel')

  try {
    eventSource = new EventSource('/api/tasks/stream')

    eventSource.addEventListener('open', () => {
      dot.className = 'sse-dot connected'
      label.textContent = 'リアルタイム'
    })

    eventSource.addEventListener('summary', (e) => {
      try {
        const summary = JSON.parse(e.data)
        updateSummary(summary)
      } catch {}
    })

    eventSource.addEventListener('task_update', () => {
      // ステータス変化を受信したら一覧を再取得
      loadTasks()
    })

    eventSource.addEventListener('heartbeat', () => {
      // keep-alive — 何もしない
    })

    eventSource.addEventListener('error', () => {
      dot.className = 'sse-dot error'
      label.textContent = '切断'
      // 5秒後に再接続
      setTimeout(connectSSE, 5000)
    })
  } catch (e) {
    dot.className = 'sse-dot error'
    label.textContent = 'エラー'
  }
}

// ── 初期化 ────────────────────────────────────────────────────────────────
loadTasks()
connectSSE()

// ドロワーをスワイプで閉じる
let touchStartY = 0
const drawer = document.getElementById('drawer')
drawer.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY }, { passive: true })
drawer.addEventListener('touchend', (e) => {
  if (e.changedTouches[0].clientY - touchStartY > 60) closeDrawer()
}, { passive: true })
</script>
